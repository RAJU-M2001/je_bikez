<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Bike Modification Studio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- STICKY NAVBAR -->

    <nav class="navbar">

        <div class="logo">JE BikeZ</div>

        <div class="menu">
            <button onclick="scrollToWorks()">Our Works</button>
            <button onclick="openAbout()">About</button>
            <button class="book-btn" onclick="openBooking()">Book Slot</button>
        </div>

    </nav>


    <!-- HERO SECTION -->

    <section class="hero">

        <div class="hero-content">

            <h1>Custom Bike Modification Studio</h1>
            <p>Transform Your Ride With Premium Modifications</p>

            <button onclick="scrollToWorks()">View Our Work</button>

        </div>

    </section>


    <!-- RECENT WORKS -->

    <section id="works" class="works">

        <h2>Our Recent Works</h2>

        <div class="carousel">

            <img src="images/bike1.jpg">
            <img src="images/bike2.jpg">
            <img src="images/bike3.jpg">
            <img src="images/bike4.jpg">

        </div>

    </section>


    <!-- ABOUT DIALOG -->

    <div id="aboutDialog" class="dialog">

        <div class="dialog-box">

            <button class="close-btn" onclick="closeAbout()">✖</button>

            <h2>About Our Shop</h2>

            <p>
                We provide premium bike modifications including LED upgrades,
                custom paint, body kits, and performance tuning.
            </p>

        </div>

    </div>


    <!-- BOOKING DIALOG -->

    <div id="bookingDialog" class="dialog">

        <div class="dialog-box">

            <button class="close-btn" onclick="closeBooking()">✖</button>

            <h2>Book Modification Slot</h2>

            <form id="bookingForm">

                <input id="name" type="text" placeholder="Name" required>

                <input id="phone" type="text" placeholder="Phone Number" required>

                <input id="bike" type="text" placeholder="Bike Model" required>

                <input id="date" type="date" required>

                <button class="submit-btn" type="submit">Book Now</button>

            </form>

        </div>

    </div>


    <script src="script.js"></script>

</body>

</html>
