<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="JE BikeZ - Premium Custom Bike Modification Studio for LED upgrades, paint, and performance.">

    <title>JE BikeZ | Bike Modification Studio</title>

    <link rel="icon" type="image/png"
        href="https://res.cloudinary.com/dzyrruoda/image/upload/v1773771899/fav-icon_korsio.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">JE BikeZ</div>
            <div class="menu">
                <button type="button" onclick="scrollToWorks()">Our Works</button>
                <button type="button" onclick="openAbout()">About</button>
                <button type="button" class="book-btn" onclick="openBooking()">Book Slot</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Custom Bike Modification Studio</h1>
                <p>Transform Your Ride With Premium Modifications</p>
                <button type="button" onclick="scrollToWorks()">View Our Work</button>
            </div>
        </section>

        <section id="works" class="works">
            <h2>Our Recent Works</h2>
            <div class="carousel">
                <img src="https://res.cloudinary.com/dzyrruoda/image/upload/v1773770484/bike1_ez7ug0.avif"
                    alt="Modified Bike 1">
                <img src="https://res.cloudinary.com/dzyrruoda/image/upload/v1773770484/bike2_afuml4.jpg"
                    alt="Modified Bike 2">
                <img src="https://res.cloudinary.com/dzyrruoda/image/upload/v1773770490/bike3_f4sgyt.png"
                    alt="Modified Bike 3">
                <img src="https://res.cloudinary.com/dzyrruoda/image/upload/v1773770497/bike4_dmhdjq.jpg"
                    alt="Modified Bike 4">
            </div>
        </section>
    </main>

    <aside id="aboutDialog" class="dialog" aria-hidden="true">
        <div class="dialog-box">
            <button class="close-btn" onclick="closeAbout()" aria-label="Close">&times;</button>
            <h2>About Our Shop</h2>
            <p>
                We provide premium bike modifications including LED upgrades,
                custom paint, body kits, and performance tuning.
            </p>
        </div>
    </aside>

    <aside id="bookingDialog" class="dialog" aria-hidden="true">
        <div class="dialog-box">
            <button class="close-btn" onclick="closeBooking()" aria-label="Close">&times;</button>
            <h2>Book Modification Slot</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <input id="name" type="text" placeholder="Name" required>
                    <input id="phone" type="tel" placeholder="Phone Number" required>
                    <input id="bike" type="text" placeholder="Bike Model" required>
                    <input id="date" type="date" required>
                </div>
                <button class="submit-btn" type="submit">Book Now</button>
            </form>
        </div>
    </aside>

    <script src="script.js"></script>

</body>

</html>
